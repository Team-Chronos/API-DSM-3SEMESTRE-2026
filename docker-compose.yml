version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  ms-profissionais:
    build:
      context: ./API3-servico-profissionais/profissionais
      dockerfile: Dockerfile
    container_name: ms-profissionais-api
    
    environment:
      SPRING_APPLICATION_NAME: ms-profissionais
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://35.198.58.59:3306/gsw_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: chronosapi
      DB_PASSWORD: "Bolsonaro#22"
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      JPA_DDL_AUTO: update
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_JPA_SHOW_SQL: "true"
      JWT_SECRET: rnssz0A37Cdr7Cw89GZowLRpSWVLuOliGAC0sy+gDZzvL9Xk3OPn4fp3CZcufV75
      JWT_EXPIRATION_MS: 86400000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,https://*.app.github.dev
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SERVER_COMPRESSION_ENABLED: "true"
      SERVER_COMPRESSION_MIME_TYPES: application/json
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

  controle-horas:
    build:
      context: ./API3-servico-controle-de-horas/controle-horas
      dockerfile: Dockerfile
    container_name: controle-horas-api
    
    environment:
      SPRING_APPLICATION_NAME: controle-horas
      SPRING_DATASOURCE_URL: jdbc:mysql://35.198.58.59:3306/gsw_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: chronosapi
      SPRING_DATASOURCE_PASSWORD: "Bolsonaro#22"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8082
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SERVER_COMPRESSION_ENABLED: "true"
      SERVER_COMPRESSION_MIME_TYPES: application/json
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  projeto:
    build:
      context: ./API3-servico-gestao-projetos/projeto
      dockerfile: Dockerfile
    container_name: projeto-api
    environment:
      SPRING_APPLICATION_NAME: projeto
      SPRING_DATASOURCE_URL: jdbc:mysql://35.198.58.59:3306/gsw_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: chronosapi
      SPRING_DATASOURCE_PASSWORD: "Bolsonaro#22"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8084
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SERVER_COMPRESSION_ENABLED: "true"
      SERVER_COMPRESSION_MIME_TYPES: application/json
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  financeiro:
    build:
      context: ./API3-servico-financeiro
      dockerfile: Dockerfile
    container_name: financeiro-api
    environment:
      SPRING_APPLICATION_NAME: financeiro
      SPRING_DATASOURCE_URL: jdbc:mysql://35.198.58.59:3306/gsw_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: chronosapi
      SPRING_DATASOURCE_PASSWORD: "Bolsonaro#22"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SERVER_PORT: 8085
      SPRING_DATASOURCE_HIKARI_READ_ONLY: "true"
      SPRING_SQL_INIT_MODE: never
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_JDBC_CORE: DEBUG
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SERVER_COMPRESSION_ENABLED: "true"
      SERVER_COMPRESSION_MIME_TYPES: application/json
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  tarefas-api:
    build:
      context: ./API3-servico-tarefas/criarTarefas/criarTarefas
      dockerfile: Dockerfile
    container_name: tarefas-api
    environment:
      SPRING_APPLICATION_NAME: criarTarefas
      SERVER_PORT: 8089
      PROJETO_API_URL: http://projeto-api:8084/projetos
      SPRING_DATASOURCE_URL: jdbc:mysql://35.198.58.59:3306/gsw_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: chronosapi
      SPRING_DATASOURCE_PASSWORD: "Bolsonaro#22"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_USE_SQL_COMMENTS: "true"
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SERVER_COMPRESSION_ENABLED: "true"
      SERVER_COMPRESSION_MIME_TYPES: application/json
    depends_on:
      - redis
      - projeto
    restart: unless-stopped
    networks:
      - app-network

  login-api:
    build:
      context: ./API3-servico-login
      dockerfile: Dockerfile
    container_name: login-api
    environment:
      SPRING_APPLICATION_NAME: login
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://35.198.58.59:3306/gsw_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: chronosapi
      SPRING_DATASOURCE_PASSWORD: "Bolsonaro#22"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    restart: unless-stopped
    networks:
      - app-network

  auth-gateway:
    build:
      context: ./API3-servico-auth-gateway/gateway
      dockerfile: Dockerfile
    container_name: auth-gateway-api
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: auth-gateway
      SERVER_PORT: 8080
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      ms-profissionais:
        condition: service_started
      controle-horas:
        condition: service_started
      projeto:
        condition: service_started
      financeiro:
        condition: service_started
      tarefas-api:
        condition: service_started
      login-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  app-network:
    driver: bridge
