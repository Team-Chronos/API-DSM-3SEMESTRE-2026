spring:
  application:
    name: gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
              - Origin
              - Access-Control-Request-Method
              - Access-Control-Request-Headers
            exposedHeaders:
              - Authorization
              - X-User-Id
              - X-Username
              - X-User-Roles
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: controle-horas
          uri: http://controle-horas:8082/
          predicates:
            - Path=/apontamento/**
          filters:
            - StripPrefix=1
        - id: ms-profissionais
          uri: http://ms-profissionais:8081/
          predicates:
            - Path=/profissionais/**
          filters:
            - StripPrefix=1
        - id: projeto
          uri: http://projeto:8084/
          predicates:
            - Path=/projeto/**
          filters:
            - StripPrefix=1
        - id: financeiro
          uri: http://financeiro:8085/
          predicates:
            - Path=/financeiro/**
          filters:
            - StripPrefix=1
        - id: tarefas-api
          uri: http://tarefas-api:8089/
          predicates:
            - Path=/tarefas/**
          filters:
            - StripPrefix=1
        - id: login-api
          uri: http://login-api:8083/
          predicates:
            - Path=/login/**
          filters:
            - StripPrefix=1

jwt:
  secret: segredo_secreto_para_jwt_token_2024
  expiration: 3600000

logging:
  level:
    com.gateway: DEBUG

server:
  port: 8080
